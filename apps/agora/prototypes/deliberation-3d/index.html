<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>אגורה · היכל הדיונים (אב־טיפוס תלת־ממד)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold: #f5c86a;
    --gold-bright: #ffe3a1;
    --cyan: #6fd7ff;
    --cyan-soft: rgba(111, 215, 255, 0.35);
    --space: #050810;
    --panel: rgba(8, 14, 32, 0.74);
    --panel-border: rgba(111, 215, 255, 0.3);
    --text: #dbe9ff;
    --ink: #0a1020;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--space); }
  body { font-family: 'Heebo', system-ui, sans-serif; color: var(--text); }
  #scene { position: fixed; inset: 0; display: block; cursor: grab; }
  #scene.dragging { cursor: grabbing; }

  /* ---------- HUD chrome ---------- */
  .hud { position: fixed; z-index: 10; pointer-events: none; }
  .hud > * { pointer-events: auto; }

  #topbar {
    top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    background: linear-gradient(to bottom, rgba(4,6,16,.85), transparent);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .core {
    width: 34px; height: 34px; border-radius: 50%;
    background: radial-gradient(circle at 50% 42%, #ffffff 0%, var(--cyan) 40%, rgba(111,215,255,0) 74%);
    box-shadow: 0 0 22px 4px rgba(111,215,255,.55), inset 0 0 8px rgba(255,255,255,.8);
    animation: corePulse 3s ease-in-out infinite;
  }
  @keyframes corePulse { 0%,100% { transform: scale(1); opacity: 1 } 50% { transform: scale(.9); opacity: .8 } }
  .brand h1 { font-size: 1.05rem; font-weight: 800; letter-spacing: .04em; color: #eaf6ff; text-shadow: 0 0 14px rgba(111,215,255,.6); }
  .brand small { display: block; font-size: .68rem; font-weight: 400; letter-spacing: .12em; color: rgba(219,233,255,.65); }

  #bell {
    position: relative;
    display: flex; align-items: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 10px; padding: 9px 16px;
    color: #eaf6ff; font-family: inherit; font-size: .9rem; font-weight: 600;
    cursor: pointer; backdrop-filter: blur(10px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    transition: box-shadow .25s, transform .15s;
  }
  #bell:hover { transform: translateY(-1px); box-shadow: 0 0 18px rgba(111,215,255,.35); }
  #bell .count {
    min-width: 22px; height: 22px; border-radius: 999px;
    background: var(--gold); color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: .78rem; font-weight: 800;
    box-shadow: 0 0 12px rgba(245,200,106,.8);
    animation: pulse 1.8s ease-in-out infinite;
  }
  #bell .count.zero { background: rgba(219,233,255,.2); color: var(--text); box-shadow: none; animation: none; }
  @keyframes pulse { 0%,100% { transform: scale(1) } 50% { transform: scale(1.15) } }

  /* ---------- Notification drawer ---------- */
  #drawer {
    top: 64px; left: 16px; width: min(340px, calc(100vw - 32px));
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 12px; backdrop-filter: blur(14px);
    box-shadow: 0 12px 40px rgba(0,0,0,.6), 0 0 30px rgba(111,215,255,.08);
    overflow: hidden;
    transform: translateY(-12px); opacity: 0; visibility: hidden;
    transition: all .25s ease;
  }
  #drawer.open { transform: translateY(0); opacity: 1; visibility: visible; }
  #drawer header { padding: 12px 16px 8px; font-weight: 800; color: var(--cyan); font-size: .92rem; letter-spacing: .05em; border-bottom: 1px solid rgba(111,215,255,.15); }
  #drawer ul { list-style: none; max-height: 46vh; overflow-y: auto; }
  #drawer li {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 12px 16px; cursor: pointer; font-size: .86rem; line-height: 1.35;
    border-bottom: 1px solid rgba(219,233,255,.06);
    transition: background .15s;
  }
  #drawer li:hover { background: rgba(111,215,255,.1); }
  #drawer li .ico { font-size: 1.15rem; filter: drop-shadow(0 0 6px rgba(111,215,255,.6)); }
  #drawer li time { display: block; font-size: .7rem; color: rgba(219,233,255,.5); margin-top: 2px; }
  #drawer li .go { margin-inline-start: auto; align-self: center; color: var(--gold); font-size: .78rem; white-space: nowrap; }
  #drawer .empty { padding: 22px 16px; text-align: center; font-size: .85rem; color: rgba(219,233,255,.55); }

  /* ---------- Room panel (bottom sheet) ---------- */
  #roomPanel {
    bottom: 0; left: 0; right: 0;
    display: flex; justify-content: center;
    padding: 0 14px calc(14px + env(safe-area-inset-bottom));
    transform: translateY(110%); transition: transform .35s cubic-bezier(.2,.9,.25,1.1);
  }
  #roomPanel.open { transform: translateY(0); }
  #roomPanel .sheet {
    width: min(560px, 100%);
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 14px; backdrop-filter: blur(14px);
    box-shadow: 0 -8px 40px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.06);
    padding: 16px 20px 18px;
  }
  #roomPanel .owner { font-size: .78rem; color: var(--cyan); font-weight: 600; letter-spacing: .06em; }
  #roomPanel h2 { font-size: 1.12rem; font-weight: 800; margin: 2px 0 10px; color: #f2f8ff; line-height: 1.3; }
  .supportRow { display: flex; align-items: center; gap: 10px; font-size: .8rem; margin-bottom: 12px; }
  .supportTrack { flex: 1; height: 8px; border-radius: 999px; background: rgba(219,233,255,.15); overflow: hidden; }
  .supportFill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--gold), var(--gold-bright)); box-shadow: 0 0 10px rgba(245,200,106,.7); transition: width .6s ease; }
  #roomNotifs { list-style: none; margin-bottom: 12px; }
  #roomNotifs li { font-size: .82rem; padding: 7px 10px; margin-bottom: 6px; border-radius: 8px; background: rgba(111,215,255,.1); border: 1px solid rgba(111,215,255,.2); }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .actions button {
    flex: 1; min-width: 110px;
    font-family: inherit; font-size: .85rem; font-weight: 700;
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    border: 1px solid var(--panel-border);
    background: rgba(111,215,255,.12); color: #eaf6ff;
    transition: background .15s, transform .12s, box-shadow .2s;
  }
  .actions button:hover { background: rgba(111,215,255,.25); transform: translateY(-1px); box-shadow: 0 0 14px rgba(111,215,255,.25); }
  .actions button.back { background: rgba(219,233,255,.06); color: var(--text); }

  /* ---------- hint / toast ---------- */
  #hint {
    bottom: calc(16px + env(safe-area-inset-bottom)); left: 50%;
    transform: translateX(-50%);
    background: rgba(5,8,18,.6); border: 1px solid rgba(111,215,255,.18);
    border-radius: 999px; padding: 8px 18px;
    font-size: .78rem; color: rgba(219,233,255,.8);
    backdrop-filter: blur(8px); white-space: nowrap;
    transition: opacity .5s;
  }
  #toast {
    top: 76px; left: 50%; transform: translateX(-50%) translateY(-8px);
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 12px; padding: 12px 20px;
    font-size: .88rem; font-weight: 600; color: #eaf6ff;
    box-shadow: 0 0 30px rgba(111,215,255,.25), 0 10px 30px rgba(0,0,0,.5);
    backdrop-filter: blur(10px);
    opacity: 0; visibility: hidden; transition: all .35s ease;
    max-width: min(420px, calc(100vw - 40px)); text-align: center;
  }
  #toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

  /* ---------- intro vignette ---------- */
  #veil { position: fixed; inset: 0; z-index: 30; background: var(--space); pointer-events: none; transition: opacity 1.6s ease .2s; }
  #veil.gone { opacity: 0; }
  .vignette { position: fixed; inset: 0; z-index: 5; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 58%, rgba(2,4,10,.55) 100%); }
</style>
</head>
<body>

<canvas id="scene"></canvas>
<div class="vignette"></div>
<div id="veil"></div>

<div class="hud" id="topbar">
  <div class="brand">
    <div class="core"></div>
    <h1>היכל הדיונים<small>CHRONOS · מועצת המסע בזמן · אב־טיפוס</small></h1>
  </div>
  <button id="bell">🔔 התראות <span class="count" id="bellCount">0</span></button>
</div>

<div class="hud" id="drawer">
  <header>מה חדש בהיכל</header>
  <ul id="notifList"></ul>
</div>

<div class="hud" id="roomPanel">
  <div class="sheet">
    <div class="owner" id="roomOwner"></div>
    <h2 id="roomTitle"></h2>
    <div class="supportRow">
      <span>תמיכה</span>
      <div class="supportTrack"><div class="supportFill" id="roomSupport"></div></div>
      <b id="roomSupportPct"></b>
    </div>
    <ul id="roomNotifs"></ul>
    <div class="actions">
      <button id="btnImprove">💡 הצע שיפור</button>
      <button id="btnSupport">🤍 תמכו</button>
      <button id="btnWatch">👁 עקוב</button>
      <button class="back" id="btnBack">↩ חזרה להיכל</button>
    </div>
  </div>
</div>

<div class="hud" id="hint">גררו כדי להביט סביב · WASD לתנועה · לחצו על תא דיון כדי להיכנס</div>
<div class="hud" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { Reflector } from 'three/addons/objects/Reflector.js';

/* ================================================================
   DATA — mock proposals & notifications (what the real game feeds)
   ================================================================ */
const ROOMS = [
  { id: 'mine', owner: 'ההצעה שלך', proposal: 'להקים מועצת לחם משותפת לאצילים ולעם, שתקבע מחיר הוגן לקמח', support: 64, mine: true },
  { id: 'r2',   owner: 'קמיל',      proposal: 'לבטל את מס המלח למשך שנה שלמה',                          support: 71 },
  { id: 'r3',   owner: 'הרוזן',     proposal: 'לפתוח את מחסני החורף של הארמון לציבור הרעב',              support: 58 },
  { id: 'r4',   owner: 'מארי',      proposal: 'אסיפת נציגים נבחרת מכל שכונה בפריז',                      support: 47 },
  { id: 'r5',   owner: 'ז׳אן',      proposal: 'בתי ספר פתוחים בחינם לכל ילד וילדה',                      support: 82 },
  { id: 'r6',   owner: 'לואיז',     proposal: 'שוק חופשי בכיכר בכל יום ראשון, ללא מכסים',                support: 39 },
];

let notifications = [
  { roomId: 'mine',   ico: '💡', text: 'קמיל הציע שיפור להצעה שלך',                    time: 'לפני 2 דק׳' },
  { roomId: 'mine',   ico: '✍️', text: 'מארי הציעה ניסוח חדש להצעה שלך',               time: 'לפני 6 דק׳' },
  { roomId: 'r3',     ico: '🏅', text: 'השיפור שהצעת לרוזן התקבל! ההצעה עודכנה',        time: 'לפני 11 דק׳' },
  { roomId: 'r5',     ico: '👁', text: 'הצעה שאתה עוקב אחריה השתנתה — גרסה חדשה',       time: 'לפני 14 דק׳' },
  { roomId: 'square', ico: '🆕', text: '3 הצעות חדשות הגיעו להיכל',                     time: 'לפני 20 דק׳' },
];

/* ================================================================
   RENDERER / SCENE / CAMERA
   ================================================================ */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.06;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1020);
scene.fog = new THREE.FogExp2(0x8fa6d8, 0.0045);

/* image-based lighting → realistic metal/glass response */
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.1, 400);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.45, 0.5, 0.88);
composer.addPass(bloom);

/* ================================================================
   LIGHTS — cool council-hall key + warm gold signature accent
   ================================================================ */
scene.add(new THREE.HemisphereLight(0xdfe9ff, 0x6a5a40, 0.65));
const keySpot = new THREE.SpotLight(0xfff2dd, 750, 70, 0.6, 0.55, 1.6);
keySpot.position.set(0, 34, 0);
keySpot.target.position.set(0, 0, 0);
scene.add(keySpot, keySpot.target);
const coreLight = new THREE.PointLight(0x8fdcff, 70, 40, 1.8);
coreLight.position.set(0, 5, 0);
scene.add(coreLight);
const goldLight = new THREE.PointLight(0xffc86e, 45, 32, 2);
goldLight.position.set(0, 7, 0);
scene.add(goldLight);

/* ================================================================
   TEXTURE HELPERS (procedural canvases — no external assets)
   ================================================================ */
function makeCanvas(w, h, draw) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  draw(c.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

const glowTexGold = makeCanvas(128, 128, (g) => {
  const grd = g.createRadialGradient(64, 64, 2, 64, 64, 62);
  grd.addColorStop(0, 'rgba(255,220,150,.95)'); grd.addColorStop(1, 'rgba(255,190,90,0)');
  g.fillStyle = grd; g.fillRect(0, 0, 128, 128);
});
const glowTexCyan = makeCanvas(128, 128, (g) => {
  const grd = g.createRadialGradient(64, 64, 2, 64, 64, 62);
  grd.addColorStop(0, 'rgba(210,240,255,.95)'); grd.addColorStop(1, 'rgba(110,200,255,0)');
  g.fillStyle = grd; g.fillRect(0, 0, 128, 128);
});
const shaftTex = makeCanvas(64, 256, (g, w, h) => {
  const grd = g.createLinearGradient(0, 0, 0, h);
  grd.addColorStop(0, 'rgba(255,240,210,.55)'); grd.addColorStop(1, 'rgba(255,240,210,0)');
  g.fillStyle = grd; g.fillRect(0, 0, w, h);
});

/* ================================================================
   FLOOR — real-time mirror + brushed overlay = polished composite
   ================================================================ */
const HALL_R = 30;
const mirror = new Reflector(new THREE.CircleGeometry(HALL_R, 72), {
  clipBias: 0.003,
  textureWidth: Math.floor(innerWidth * Math.min(devicePixelRatio, 1.5)),
  textureHeight: Math.floor(innerHeight * Math.min(devicePixelRatio, 1.5)),
  color: 0x929eb8,
});
mirror.rotation.x = -Math.PI / 2;
scene.add(mirror);

const floorTex = makeCanvas(1024, 1024, (g, w, h) => {
  g.fillStyle = 'rgba(164,176,204,1)'; g.fillRect(0, 0, w, h);
  /* brushed radial streaks */
  for (let i = 0; i < 900; i++) {
    const a = Math.random() * Math.PI * 2, r0 = Math.random() * 500;
    g.strokeStyle = `rgba(${70 + Math.random() * 40},${85 + Math.random() * 40},${130 + Math.random() * 50},${0.02 + Math.random() * 0.045})`;
    g.lineWidth = 1 + Math.random() * 2;
    g.beginPath();
    g.arc(w / 2, h / 2, r0, a, a + 0.25 + Math.random() * 0.6);
    g.stroke();
  }
  /* concentric guide rings */
  [76, 150, 328, 486].forEach((r, i) => {
    g.strokeStyle = i % 2 ? 'rgba(60,130,190,.30)' : 'rgba(60,130,190,.15)';
    g.lineWidth = 2.5;
    g.beginPath(); g.arc(w / 2, h / 2, r, 0, 7); g.stroke();
  });
});
const floorSkin = new THREE.Mesh(
  new THREE.CircleGeometry(HALL_R, 72),
  new THREE.MeshStandardMaterial({ map: floorTex, transparent: true, opacity: 0.78, roughness: 0.42, metalness: 0.25 })
);
floorSkin.rotation.x = -Math.PI / 2;
floorSkin.position.y = 0.012;
scene.add(floorSkin);

/* emissive floor rings marking the pod circle + core */
[[4.6, 0xf5c86a, .5], [19.4, 0x6fd7ff, .45]].forEach(([r, col, op]) => {
  const ringF = new THREE.Mesh(new THREE.RingGeometry(r - 0.09, r + 0.09, 96),
    new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: op, blending: THREE.AdditiveBlending, depthWrite: false }));
  ringF.rotation.x = -Math.PI / 2; ringF.position.y = 0.02;
  scene.add(ringF);
});

/* ================================================================
   HALL SHELL — plinth, glass band, dome with ribs & light rings
   ================================================================ */
const shellMat = new THREE.MeshStandardMaterial({ color: 0xcbd6ef, metalness: 0.3, roughness: 0.55, side: THREE.BackSide });
const plinthWall = new THREE.Mesh(new THREE.CylinderGeometry(HALL_R, HALL_R, 1.6, 72, 1, true), shellMat);
plinthWall.position.y = 0.8; scene.add(plinthWall);
const glassBand = new THREE.Mesh(new THREE.CylinderGeometry(HALL_R, HALL_R, 3.6, 72, 1, true),
  new THREE.MeshStandardMaterial({ color: 0x9fc4ff, metalness: 0.1, roughness: 0.05, transparent: true, opacity: 0.1, side: THREE.DoubleSide }));
glassBand.position.y = 3.4; scene.add(glassBand);
const upperWall = new THREE.Mesh(new THREE.CylinderGeometry(HALL_R, HALL_R, 0.8, 72, 1, true), shellMat);
upperWall.position.y = 5.6; scene.add(upperWall);

/* mullions between glass panes */
const mullionMat = new THREE.MeshStandardMaterial({ color: 0x9fb0d6, metalness: 0.7, roughness: 0.3 });
for (let i = 0; i < 24; i++) {
  const a = (i / 24) * Math.PI * 2;
  const m = new THREE.Mesh(new THREE.BoxGeometry(0.28, 4.4, 0.28), mullionMat);
  m.position.set(Math.sin(a) * (HALL_R - 0.1), 3.4, Math.cos(a) * (HALL_R - 0.1));
  scene.add(m);
}

const dome = new THREE.Mesh(new THREE.SphereGeometry(HALL_R, 64, 28, 0, Math.PI * 2, 0, Math.PI / 2), shellMat);
dome.position.y = 6; scene.add(dome);

/* dome ribs */
const ribMat = new THREE.MeshStandardMaterial({ color: 0xb4c2e6, metalness: 0.5, roughness: 0.4, emissive: 0x8fa8d8, emissiveIntensity: 0.3 });
for (let i = 0; i < 12; i++) {
  const rib = new THREE.Mesh(new THREE.TorusGeometry(HALL_R - 0.35, 0.16, 8, 40, Math.PI / 2), ribMat);
  rib.position.y = 6;
  rib.rotation.y = (i / 12) * Math.PI * 2;
  rib.rotation.z = 0;
  scene.add(rib);
}
/* glowing rings on the dome */
[[28, 16], [21.2, 27.2]].forEach(([r, y]) => {
  const lr = new THREE.Mesh(new THREE.TorusGeometry(r, 0.1, 8, 96),
    new THREE.MeshStandardMaterial({ color: 0xbfe9ff, emissive: 0x9fd8ff, emissiveIntensity: 2.2, roughness: .4 }));
  lr.rotation.x = Math.PI / 2; lr.position.y = y;
  scene.add(lr);
});

/* oculus + volumetric-style shaft */
const oculus = new THREE.Mesh(new THREE.CircleGeometry(3.6, 48),
  new THREE.MeshBasicMaterial({ color: 0xeaf4ff }));
oculus.rotation.x = Math.PI / 2; oculus.position.y = 35.4;
scene.add(oculus);
const shaft = new THREE.Mesh(new THREE.CylinderGeometry(3.6, 6.5, 34, 32, 1, true), new THREE.MeshBasicMaterial({
  map: shaftTex, transparent: true, opacity: 0.1, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
}));
shaft.material.opacity = 0.16;
shaft.position.y = 18;
scene.add(shaft);

/* ================================================================
   OUTSIDE — starfield + nebulae seen through the glass band
   ================================================================ */
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i = 0; i < 1400; i++) {
  const a = Math.random() * Math.PI * 2, e = (Math.random() - 0.15) * Math.PI * 0.5;
  const r = 200;
  starPos.push(Math.sin(a) * Math.cos(e) * r, Math.sin(e) * r + 4, Math.cos(a) * Math.cos(e) * r);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xcdd7ff, size: 0.6, sizeAttenuation: true, transparent: true, opacity: 0.9, fog: false })));

/* soft aurora band outside the glass — warm horizon, feel-good */
const auroraTex = makeCanvas(64, 256, (g, w, h) => {
  const grd = g.createLinearGradient(0, 0, 0, h);
  grd.addColorStop(0, 'rgba(120,190,255,0)');
  grd.addColorStop(0.35, 'rgba(140,205,255,.5)');
  grd.addColorStop(0.62, 'rgba(255,210,150,.55)');
  grd.addColorStop(1, 'rgba(255,180,110,.15)');
  g.fillStyle = grd; g.fillRect(0, 0, w, h);
});
const aurora = new THREE.Mesh(new THREE.CylinderGeometry(110, 110, 26, 72, 1, true),

const R = 20;
const wrapText = (g, text, maxW) => {
  const words = text.split(' '); const lines = []; let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (g.measureText(test).width > maxW && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  return lines;
};

function screenTexture(room) {
  return makeCanvas(1024, 640, (g, w, h) => {
    g.fillStyle = 'rgba(6,14,34,.92)'; g.fillRect(0, 0, w, h);
    /* scanlines */
    for (let y = 0; y < h; y += 6) { g.fillStyle = 'rgba(120,200,255,.035)'; g.fillRect(0, y, w, 2); }
    /* frame + corner brackets */
    const edge = room.mine ? '#f5c86a' : '#6fd7ff';
    g.strokeStyle = edge; g.lineWidth = 5;
    g.shadowColor = edge; g.shadowBlur = 22;
    g.strokeRect(10, 10, w - 20, h - 20);
    g.shadowBlur = 0;
    g.lineWidth = 10;
    [[10, 10, 1, 1], [w - 10, 10, -1, 1], [10, h - 10, 1, -1], [w - 10, h - 10, -1, -1]].forEach(([x, y, sx, sy]) => {
      g.beginPath(); g.moveTo(x + 70 * sx, y); g.lineTo(x, y); g.lineTo(x, y + 55 * sy); g.stroke();
    });
    g.direction = 'rtl'; g.textAlign = 'center';
    g.fillStyle = room.mine ? '#ffe3a1' : '#9fe0ff';
    g.font = '800 50px Heebo, sans-serif';
    g.fillText(room.mine ? '⭐ ' + room.owner : 'ההצעה של ' + room.owner, w / 2, 96);
    g.strokeStyle = 'rgba(111,215,255,.4)'; g.lineWidth = 2;
    g.beginPath(); g.moveTo(150, 126); g.lineTo(w - 150, 126); g.stroke();
    g.fillStyle = '#f2f8ff'; g.font = '700 56px Heebo, sans-serif';
    g.shadowColor = 'rgba(160,220,255,.7)'; g.shadowBlur = 10;
    const lines = wrapText(g, room.proposal, w - 170);
    lines.forEach((ln, i) => g.fillText(ln, w / 2, 230 + i * 76));
    g.shadowBlur = 0;
    const by = h - 96;
    g.fillStyle = 'rgba(219,233,255,.14)'; g.fillRect(130, by, w - 260, 30);
    const grd = g.createLinearGradient(0, 0, w, 0);
    grd.addColorStop(0, '#ffe3a1'); grd.addColorStop(1, '#f5c86a');
    g.fillStyle = grd;
    g.fillRect(130 + (w - 260) * (1 - room.support / 100), by, (w - 260) * room.support / 100, 30);
    g.font = '800 42px Heebo, sans-serif'; g.fillStyle = '#bfe9ff';
    g.fillText(`תמיכה ${room.support}%`, w / 2, by - 20);
  });
}

function nameSprite(room) {

    g.font = '800 58px Heebo, sans-serif';

    g.strokeStyle = room.mine ? 'rgba(245,200,106,.8)' : 'rgba(111,215,255,.7)';

function badgeTexture(count) {

/* ================================================================
   CAMERA RIG — first-person yaw/pitch + WASD + cinematic flights
   ================================================================ */
const rig = { pos: new THREE.Vector3(), yaw: 0, pitch: 0 };
const minePav = pavilions.get('mine');
rig.pos.copy(minePav.pos).multiplyScalar(0.6).setY(1.7);
rig.yaw = Math.atan2(-rig.pos.x, -rig.pos.z) + Math.PI;

let flight = null;
function flyTo(pos, yaw, pitch, dur, onDone) {
  const dy = ((yaw - rig.yaw + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
  flight = { p0: rig.pos.clone(), p1: pos.clone(), y0: rig.yaw, dy, pi0: rig.pitch, pi1: pitch, t: 0, dur, onDone };
}
const ease = t => t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

let mode = 'square';           /* 'square' | roomId */
const keys = new Set();
addEventListener('keydown', e => keys.add(e.code));
addEventListener('keyup', e => keys.delete(e.code));

let dragging = false, moved = 0, lx = 0, ly = 0;
canvas.addEventListener('pointerdown', e => { dragging = true; moved = 0; lx = e.clientX; ly = e.clientY; canvas.classList.add('dragging'); try { canvas.setPointerCapture(e.pointerId); } catch {} });
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lx, dy = e.clientY - ly;
  moved += Math.abs(dx) + Math.abs(dy);
  lx = e.clientX; ly = e.clientY;
  if (flight) return;
  rig.yaw -= dx * 0.0042;
  rig.pitch = THREE.MathUtils.clamp(rig.pitch - dy * 0.0035, -0.7, 0.6);
});
canvas.addEventListener('pointerup', e => {
  dragging = false; canvas.classList.remove('dragging');
  if (moved < 7) handleClick(e);
});

const ray = new THREE.Raycaster();
function handleClick(e) {
  if (flight) return;
  const nd = new THREE.Vector2((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  ray.setFromCamera(nd, camera);
  const hits = ray.intersectObjects([...pavilions.values()].map(p => p.hit));
  if (hits.length) enterRoom(hits[0].object.userData.roomId);
}

/* ================================================================
   ROOM NAVIGATION
   ================================================================ */
const $ = id => document.getElementById(id);

function enterRoom(roomId) {
  const pav = pavilions.get(roomId);
  if (!pav || mode === roomId) return;
  mode = roomId;
  closeDrawer();
  const dir = pav.pos.clone().normalize();
  const camPos = pav.pos.clone().sub(dir.clone().multiplyScalar(7.4)).setY(2.1);
  const yaw = Math.atan2(pav.pos.x - camPos.x, pav.pos.z - camPos.z) + Math.PI;
  flyTo(camPos, yaw, 0.0, 1.6, () => {
    openRoomPanel(pav.room);
    clearRoomNotifs(roomId);
  });
  $('hint').style.opacity = '0';
}

function backToSquare() {
  mode = 'square';
  $('roomPanel').classList.remove('open');
  const p = new THREE.Vector3(0, 1.8, 9);
  flyTo(p, Math.PI, 0.02, 1.4);
  $('hint').style.opacity = '1';
}
$('btnBack').onclick = backToSquare;

function overviewFlight() {
  mode = 'square';
  $('roomPanel').classList.remove('open');
  closeDrawer();
  flyTo(new THREE.Vector3(0, 11, 21), Math.PI, -0.42, 1.8, () => {
    clearRoomNotifs('square');
  });
}

function openRoomPanel(room) {
  $('roomOwner').textContent = room.mine ? '⭐ תא הדיון שלך' : `תא הדיון של ${room.owner}`;
  $('roomTitle').textContent = room.proposal;
  $('roomSupport').style.width = room.support + '%';
  $('roomSupportPct').textContent = room.support + '%';
  const list = $('roomNotifs');
  list.innerHTML = '';
  notifications.filter(n => n.roomId === room.id).forEach(n => {
    const li = document.createElement('li');
    li.textContent = `${n.ico} ${n.text}`;
    list.appendChild(li);
  });
  $('roomPanel').classList.add('open');
}

/* ================================================================
   NOTIFICATIONS — bell, drawer, floating badges
   ================================================================ */
function refreshBadges() {
  const counts = {};
  notifications.forEach(n => counts[n.roomId] = (counts[n.roomId] || 0) + 1);
  pavilions.forEach((pav, id) => {
    pav.badge.material.map = badgeTexture(counts[id] || 0);
    pav.badge.material.needsUpdate = true;
    pav.badge.userData.active = !!counts[id];
  });
  const total = notifications.length;
  const bc = $('bellCount');
  bc.textContent = total;
  bc.classList.toggle('zero', !total);
  const list = $('notifList');
  list.innerHTML = '';
  if (!total) {
    list.innerHTML = '<div class="empty">הכול נקרא — ההיכל שקט 🌌</div>';
    return;
  }
  notifications.forEach(n => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="ico">${n.ico}</span><div>${n.text}<time>${n.time || ''}</time></div><span class="go">${n.roomId === 'square' ? 'למבט־על ←' : 'לתא ←'}</span>`;
    li.onclick = () => n.roomId === 'square' ? overviewFlight() : enterRoom(n.roomId);
    list.appendChild(li);
  });
}

function clearRoomNotifs(roomId) {
  const before = notifications.length;
  notifications = notifications.filter(n => n.roomId !== roomId);
  if (notifications.length !== before) refreshBadges();
}

let drawerOpen = false;
function closeDrawer() { drawerOpen = false; $('drawer').classList.remove('open'); }
$('bell').onclick = () => { drawerOpen = !drawerOpen; $('drawer').classList.toggle('open', drawerOpen); };

function toast(msg, ms = 3800) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('show'), ms);
}

}, 14000);

refreshBadges();
setTimeout(() => toast(`🔔 יש לך ${notifications.length} התראות — פתחו את הפעמון או חפשו את התאים הזוהרים`), 2200);

/* ================================================================
   MAIN LOOP
   ================================================================ */
const clock = new THREE.Clock();
const fwd = new THREE.Vector3(), rightv = new THREE.Vector3();

function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  /* flight tween */
  if (flight) {
    flight.t += dt / flight.dur;
    const k = ease(Math.min(flight.t, 1));
    rig.pos.lerpVectors(flight.p0, flight.p1, k);
    rig.pos.y = THREE.MathUtils.lerp(flight.p0.y, flight.p1.y, k) + Math.sin(k * Math.PI) * 0.7;
    rig.yaw = flight.y0 + flight.dy * k;
    rig.pitch = THREE.MathUtils.lerp(flight.pi0, flight.pi1, k);
    if (flight.t >= 1) { const f = flight; flight = null; f.onDone && f.onDone(); }
  } else if (mode === 'square') {
    /* WASD walk */
    fwd.set(-Math.sin(rig.yaw), 0, -Math.cos(rig.yaw));
    rightv.set(-fwd.z, 0, fwd.x);
    const sp = 6 * dt;
    if (keys.has('KeyW') || keys.has('ArrowUp')) rig.pos.addScaledVector(fwd, sp);
    if (keys.has('KeyS') || keys.has('ArrowDown')) rig.pos.addScaledVector(fwd, -sp);
    if (keys.has('KeyA') || keys.has('ArrowLeft')) rig.pos.addScaledVector(rightv, -sp);
    if (keys.has('KeyD') || keys.has('ArrowRight')) rig.pos.addScaledVector(rightv, sp);
    const rr = Math.hypot(rig.pos.x, rig.pos.z);
    if (rr > 24) { rig.pos.x *= 24 / rr; rig.pos.z *= 24 / rr; }
    if (rr < 5.4 && rr > 0.001) { rig.pos.x *= 5.4 / rr; rig.pos.z *= 5.4 / rr; }
    rig.pos.y = 1.7;
  }

  camera.position.copy(rig.pos);
  camera.rotation.set(0, 0, 0, 'YXZ');
  camera.rotateY(rig.yaw);
  camera.rotateX(rig.pitch);

  /* ambient life */
  coreLight.intensity = 56 + Math.sin(t * 2.1) * 8;
  holoCol.rotation.y = t * 0.5;
  holoCol2.rotation.y = -t * 0.8;
  holoTex.offset.y = -t * 0.06;
  coreRings.forEach((cr, i) => {
    cr.rotation.x = Math.PI / 2 + Math.sin(t * 0.6 + i) * 0.28;
    cr.rotation.y = t * (0.4 + i * 0.25);
    cr.position.y = 5 + i * 0.4 + Math.sin(t * 1.4 + i * 2) * 0.15;
  });
  coreGem.rotation.y = t * 0.7;
  coreGem.rotation.x = Math.sin(t * 0.5) * 0.3;
  coreGem.position.y = 8.6 + Math.sin(t * 1.2) * 0.18;
  coreGlow.position.y = coreGem.position.y;
  swirl.rotation.z = -t * 0.9;
  ring.rotation.z = t * 0.25;

  const rp = risePts.geometry.attributes.position;
  for (let i = 0; i < riseN; i++) {
    const d = riseData[i];
    const y = (t * d.sp + d.y0) % 8;
    rp.setXYZ(i, Math.sin(d.a + t * 0.7) * d.r, 1.4 + y, Math.cos(d.a + t * 0.7) * d.r);
  }
  rp.needsUpdate = true;

  const dp = dust.geometry.attributes.position;
  for (let i = 0; i < dustN; i++) {
    const p = dustData[i];
    dp.setY(i, p.y + Math.sin(t * p.sp + p.ph) * 0.4);
    dp.setX(i, p.x + Math.sin(t * 0.12 + p.ph) * 0.8);
  }
  dp.needsUpdate = true;

  pavilions.forEach(pav => {
    pav.holoScreen.position.y = 2.45 + Math.sin(t * 1.1 + pav.angle * 3) * 0.045;
    pav.holoBit.rotation.y = t * 1.6;
    pav.holoBit.position.y = 1.35 + Math.sin(t * 2 + pav.angle) * 0.08;
    if (pav.badge.userData.active) {
      const k = 1.6 + Math.sin(t * 3.4 + pav.angle * 5) * 0.22;
      pav.badge.scale.setScalar(k);
      pav.badge.position.y = 6.5 + Math.sin(t * 1.8 + pav.angle) * 0.12;
    } else {
      pav.badge.scale.setScalar(0.001);
    }
  });

  composer.render();
}
tick();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

/* lift the veil */
requestAnimationFrame(() => document.getElementById('veil').classList.add('gone'));
</script>
</body>
</html>
