<!doctype html>
<html lang="%lang%" dir="%dir%">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Absolute paths: relative hrefs re-resolve against the current URL after
		     client-side navigation, 404ing the manifest on nested routes. -->
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" content="#0e1116" />
		<link rel="apple-touch-icon" href="/icons/wizcol-chat-180.png" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="WizCol-Chat" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
